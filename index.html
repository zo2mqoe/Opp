<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> 
    <title>Mickey Lafa Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        
        body { 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 20px; 
            background-color: #1a1a1a; 
            overflow-y: auto; 
        }
        
        /* หน้า Landing Page */
        #landing-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; transition: opacity 0.8s ease; }
        
        /* Background Video */
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        /* Card Profile */
        .profile-card { background: white; width: 100%; max-width: 500px; border-radius: 20px; overflow: hidden; padding-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1; }
        
        .banner { width: 100%; height: 180px; object-fit: cover; display: block; background-color: #222; }
        
        /* ส่วนคอนเทนเนอร์โปรไฟล์แบบ IG สตอรี่ */
        .avatar-container { 
            text-align: center; 
            margin-top: -60px; 
            margin-bottom: 10px; 
            position: relative;
            display: flex;
            justify-content: center;
        }
        
        /* กรอบวงกลมรูปโปรไฟล์ */
        .avatar-wrapper {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid white;
            background: #eee;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer;
            user-select: none;
        }

        .avatar { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease-in-out; 
            opacity: 0;
        }

        /* รูปที่กำลังแสดงอยู่ */
        .avatar.active {
            opacity: 1;
            position: relative;
        }
        
        .info { text-align: center; margin-bottom: 25px; }
        .info h1 { font-size: 1.5rem; color: #333; }
        .info p { color: #777; font-size: 0.9rem; min-height: 1.2rem; }
        
        .links-container { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 15px; border-radius: 50px; background: #f8f8f8; color: #333; text-decoration: none; font-weight: 500; border: 1px solid #eee; transition: all 0.2s; cursor: pointer; }
        .btn:hover { background: #eee; transform: translateY(-2px); }
        .btn span { margin-right: 10px; font-size: 1.2rem; }
        
        /* ===== กล่อง Modal โดเนทแบบ QR Code คู่กลับมาแล้ว ✨ ===== */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); overflow-y: auto; }
        
        .modal-content { 
            background-color: #fff; 
            margin: 10% auto; 
            padding: 25px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 550px; /* ขยายให้กว้างเพื่อรองรับ 2 รูปคู่ */
            text-align: center; 
            position: relative; 
        }
        
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #666; }
        
        /* จัดระเบียบให้ QR Code เรียงข้างกัน */
        .qr-wrap { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 15px;
        }
        
        .qr-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .qr-box h4 {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 5px;
        }
        
        .qr-img { width: 100%; max-width: 220px; height: auto; border-radius: 10px; border: 1px solid #eee; }
        
        /* สลับเป็นแนวตั้งถ้ารันบนมือถือจอเล็กมากๆ */
        @media (max-width: 480px) {
            .qr-wrap { flex-direction: column; gap: 15px; align-items: center; }
            .modal-content { margin: 15% auto; }
        }
    </style>
</head>
<body>

    <div id="landing-page" onclick="startExperience()">
        <h1 style="margin-bottom: 10px;">แตะเพื่อเข้าสู่หน้าโปรไฟล์</h1>
        <p style="font-size: 0.8rem; opacity: 0.7;">(ไอ้อ้วงงง🐽)</p>
    </div>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <video autoplay loop muted playsinline class="video-bg">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="profile-card">
        <img src="https://i.postimg.cc/gkTStmCG/A6EBA815-3650-4D1B-B91F-616C6EE167DC.gif" 
             class="banner" 
             alt="Banner" 
             referrerpolicy="no-referrer">
             
        <div class="avatar-container">
            <div class="avatar-wrapper" id="avatar-wrapper" onclick="nextProfileImage()">
                </div>
        </div>

        <div class="info">
            <h1>Mickey Lafa</h1>
            <p>Welcome to my profile</p>
        </div>

        <div class="links-container">
            <a href="https://discord.gg/NCEBB2BNaf" target="_blank" class="btn"><span>🛒</span>Discord Shop รับเติมเกมต่างๆ</a>
            <a href="https://discord.gg/NkNWFRAnH" target="_black" class="btn"><span>📮</span>Herver</a>
            <a href="https://tiktok.com/@upze12" target="_blank" class="btn"><span>🛟</span>TikTok สตรีมจันทร์-ศุกร์</a>
            <button class="btn" onclick="openModal()"><span>🎫</span>ช่องทางการโดเนททรูมันนี้</button>
        </div>
    </div>

    <div id="donateModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 style="color: #333; margin-bottom: 5px;">ช่องทางโดเนท</h3>
            
            <div class="qr-wrap">
                <div class="qr-box">
                    <h4>ทรูมันนี่</h4>
                    <img src="https://i.postimg.cc/K8wDxvmS/IMG-1010.jpg" class="qr-img" alt="TrueMoney QR">
                </div>
                
                <div class="qr-box">
                    <h4>ธนาคาร</h4>
                    <img src="https://i.postimg.cc/wTdKTgTJ/IMG-1008.jpg" class="qr-img" alt="Bank QR">
                </div>
            </div>
            
            <p style="font-size: 0.8rem; color: #999; margin-top: 15px;">ขอบคุณสำหรับการสนับสนุนครับ</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById("bg-music");
        const landing = document.getElementById("landing-page");

        // ลิสต์รูปโปรไฟล์ทั้ง 3 รูปของคุณ (อัปเดตตรงตามที่คุณส่งมาแล้ว)
        const profileImages = [
            "https://i.postimg.cc/d3Tv74d5/73676c8f55fd4aa38674e7d98fe3a315.gif", // รูปที่ 1 (GIF หลัก)
            "https://i.postimg.cc/cHMzv8Js/79A5F0BC-3322-4E92-AEBD-FD199CE5BCC1.jpg", // รูปที่ 2
            "https://i.postimg.cc/vDRxCDW7/IMG-1012.jpg"                          // รูปที่ 3
        ];

        const avatarWrapper = document.getElementById("avatar-wrapper");
        
        profileImages.forEach((src, index) => {
            const img = document.createElement("img");
            img.src = src;
            img.className = "avatar";
            img.alt = "Mickey Lafa Profile " + (index + 1);
            if (index === 0) img.classList.add("active");
            avatarWrapper.appendChild(img);
        });

        let currentImgIndex = 0;
        const totalImages = profileImages.length;
        const intervalTime = 3000; 
        let profileInterval;

        function changeProfileImage() {
            const images = document.querySelectorAll(".avatar");
            if(images.length > 0) {
                images[currentImgIndex].classList.remove("active");
                currentImgIndex = (currentImgIndex + 1) % totalImages;
                images[currentImgIndex].classList.add("active");
            }
        }

        function nextProfileImage() {
            clearInterval(profileInterval);
            changeProfileImage();
            profileInterval = setInterval(changeProfileImage, intervalTime);
        }

        profileInterval = setInterval(changeProfileImage, intervalTime);

        function startExperience() {
            audio.play().catch(e => console.log("Audio play failed, user interaction needed."));
            landing.style.opacity = "0";
            setTimeout(() => { 
                landing.style.display = "none"; 
            }, 800);
        }

        function openModal() { 
            document.getElementById("donateModal").style.display = "block"; 
        }
        function closeModal() { 
            document.getElementById("donateModal").style.display = "none"; 
        }

        window.onclick = function(event) { 
            const modal = document.getElementById("donateModal");
            if (event.target == modal) { 
                closeModal(); 
            } 
        }
    </script>
</body>
</html>
