<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> <!-- ช่วยให้โหลดรูปจากเว็บฝากรูปได้เสถียรขึ้น -->
    <title>Mickey Lafa Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background-color: #1a1a1a; overflow: hidden; }
        
        /* หน้า Landing Page */
        #landing-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; transition: opacity 0.8s ease; }
        
        /* Background Video */
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        /* Card Profile */
        .profile-card { background: white; width: 100%; max-width: 500px; border-radius: 20px; overflow: hidden; padding-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1; }
        
        /* แก้ไขส่วน Banner ให้รองรับ GIF */
        .banner { width: 100%; height: 180px; object-fit: cover; display: block; background-color: #222; }
        
        .avatar-container { text-align: center; margin-top: -60px; margin-bottom: 10px; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 6px solid white; object-fit: cover; background: #eee; }
        
        .info { text-align: center; margin-bottom: 25px; }
        .info h1 { font-size: 1.5rem; color: #333; }
        .info p { color: #777; font-size: 0.9rem; min-height: 1.2rem; }
        
        .links-container { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 15px; border-radius: 50px; background: #f8f8f8; color: #333; text-decoration: none; font-weight: 500; border: 1px solid #eee; transition: all 0.2s; cursor: pointer; }
        .btn:hover { background: #eee; transform: translateY(-2px); }
        .btn span { margin-right: 10px; font-size: 1.2rem; }
        
        /* Modal โดเนท */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: #fff; margin: 15% auto; padding: 20px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; }
        .qr-img { width: 100%; max-width: 200px; height: auto; margin-top: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- หน้าแรกที่ต้องแตะก่อนเข้า -->
    <div id="landing-page" onclick="startExperience()">
        <h1 style="margin-bottom: 10px;">แตะเพื่อเข้าสู่หน้าโปรไฟล์</h1>
        <p style="font-size: 0.8rem; opacity: 0.7;">(เปิดเพลงและวิดีโอพื้นหลัง)</p>
    </div>

    <!-- ไฟล์เสียงพื้นหลัง -->
    <audio id="bg-music" src="music.mp3" loop></audio>

    <!-- วิดีโอพื้นหลัง -->
    <video autoplay loop muted playsinline class="video-bg">
        <source src="background.mp4" type="video/mp4">
    </video>

    <!-- การ์ดโปรไฟล์ -->
    <div class="profile-card">
        <!-- แก้ไขลิงก์ Banner เป็นอันใหม่ที่คุณส่งมา -->
        <img src="https://i.postimg.cc/ZKc2nfxr/846e76474901429287247ff0d99ce839.gif" 
             class="banner" 
             alt="Banner" 
             referrerpolicy="no-referrer">
             
        <div class="avatar-container">
            <img src="https://i.postimg.cc/wTQ7nKGy/IMG-9434.jpg" class="avatar" alt="Mickey Lafa">
        </div>

        <div class="info">
            <h1>Mickey Lafa</h1>
            <p>Welcome to my profile</p>
        </div>

        <div class="links-container">
            <a href="https://discord.gg/NCEBB2BNaf" target="_blank" class="btn"><span>🛒</span> Discord Shop</a>
            <a href="https://tiktok.com/@upze12" target="_blank" class="btn"><span>🛟</span> TikTok ไลค์จันทร์-ศุกร์</a>
            <button class="btn" onclick="openModal()"><span>🎫</span> โดเนทสนับสนุน</button>
        </div>
    </div>

    <!-- ส่วนของ Modal -->
    <div id="donateModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 style="color: #333;">สแกนเพื่อโดเนท</h3>
            <img src="https://i.postimg.cc/L8W0XsGj/IMG-6393.jpg" class="qr-img" alt="QR Code">
            <p style="font-size: 0.8rem; color: #999; margin-top: 10px;">ขอบคุณสำหรับการสนับสนุนครับ</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById("bg-music");
        const landing = document.getElementById("landing-page");

        // ฟังก์ชันเริ่มประสบการณ์ (เล่นเพลงและซ่อนหน้า Landing)
        function startExperience() {
            audio.play().catch(e => console.log("Audio play failed, user interaction needed."));
            landing.style.opacity = "0";
            setTimeout(() => { 
                landing.style.display = "none"; 
            }, 800);
        }

        // ฟังก์ชันจัดการ Modal
        function openModal() { 
            document.getElementById("donateModal").style.display = "block"; 
        }
        function closeModal() { 
            document.getElementById("donateModal").style.display = "none"; 
        }

        // ปิด Modal เมื่อคลิกพื้นที่ด้านนอก
        window.onclick = function(event) { 
            const modal = document.getElementById("donateModal");
            if (event.target == modal) { 
                closeModal(); 
            } 
        }
    </script>
</body>
</html>
